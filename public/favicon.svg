<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="50%" stop-color="#7B2FFF"/>
      <stop offset="100%" stop-color="#39FF14"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="#050510"/>
  <g transform="translate(32,32)" filter="url(#glow)">
    <!-- Outer hexagon -->
    <polygon points="0,-22 19.05,-11 19.05,11 0,22 -19.05,11 -19.05,-11" fill="none" stroke="url(#g)" stroke-width="1.5" opacity="0.6"/>
    <!-- Inner hexagon -->
    <polygon points="0,-14 12.12,-7 12.12,7 0,14 -12.12,7 -12.12,-7" fill="none" stroke="#00D4FF" stroke-width="2" opacity="0.9"/>
    <!-- Core dot -->
    <circle cx="0" cy="0" r="4" fill="#00D4FF" opacity="0.8"/>
    <circle cx="0" cy="0" r="2" fill="#fff" opacity="0.9"/>
  </g>
</svg>
